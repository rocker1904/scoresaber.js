name: CI

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

jobs:
    build-and-test:
        name: Build & test (Node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: ['22', '24', '26']
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: ${{ matrix.node }}
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Lint
              run: npm run lint
            - name: Check formatting
              run: npm run format:check
            - name: Typecheck
              run: npm run typecheck
            - name: Build (ESM + CJS + d.ts)
              run: npm run build
            - name: Smoke-test the published exports
              run: npm run smoke
            - name: Check the API report is up to date
              run: npm run api:check
            - name: Build the docs
              run: npm run docs
            - name: Run tests with coverage
              run: npm run test:coverage

    integration:
        name: Integration (live ScoreSaber API)
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        timeout-minutes: 10 # don't hang a PR if the live API is slow/unreachable
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '22'
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Run the test suite against the live API
              run: npm test
              env:
                  SCORESABER_INTEGRATION: '1'
