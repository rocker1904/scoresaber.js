name: CI

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: ['20', '22', '24']
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
            - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
              with:
                  node-version: ${{ matrix.node }}
                  cache: 'npm'
            - run: npm ci
            - run: npm run lint
            - run: npm run format:check
            - run: npm run typecheck
            - run: npm run build
            - run: npm run smoke
            - run: npm run api:check
            - run: npm run docs
            - run: npm run test:coverage

    # Hits the live ScoreSaber API, so it only runs on pull requests (this repo can
    # sit untouched for months — a scheduled run would just burn rate-limit budget).
    integration:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        timeout-minutes: 10 # don't hang a PR if the live API is slow/unreachable
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
            - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
              with:
                  node-version: '20'
                  cache: 'npm'
            - run: npm ci
            - run: npm test
              env:
                  SCORESABER_INTEGRATION: '1'
