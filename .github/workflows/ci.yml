name: CI

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: ['20', '22', '24']
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: ${{ matrix.node }}
                  cache: 'npm'
            - run: npm ci
            - run: npm run lint
            - run: npm run format:check
            - run: npm run typecheck
            - run: npm run build
            - run: npm run smoke
            - run: npm run api:check
            - run: npm run docs
            - run: npm run test:coverage

    # Hits the live ScoreSaber API, so it only runs on pull requests (this repo can
    # sit untouched for months — a scheduled run would just burn rate-limit budget).
    integration:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        timeout-minutes: 10 # don't hang a PR if the live API is slow/unreachable
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '20'
                  cache: 'npm'
            - run: npm ci
            - run: npm test
              env:
                  SCORESABER_INTEGRATION: '1'
