name: Release

on:
    push:
        branches: [main]

# Cancel superseded release runs.
concurrency: release

permissions: {}

jobs:
    # Maintains the "Version Packages" PR from accumulated changesets. Ungated so
    # contributor merges flow freely; this job never publishes.
    version:
        runs-on: ubuntu-latest
        permissions:
            contents: write # update the "Version Packages" PR / tags
            pull-requests: write # open that PR
        outputs:
            shouldPublish: ${{ steps.check.outputs.shouldPublish }}
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '20'
                  cache: 'npm'
            - run: npm ci
            - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            # Publish only when package.json is ahead of the registry (i.e. the
            # Version Packages PR just merged), so the approval gate doesn't fire
            # on ordinary pushes.
            - id: check
              run: |
                  local=$(node -p "require('./package.json').version")
                  remote=$(npm view scoresaber.js version 2>/dev/null || echo none)
                  echo "local=$local remote=$remote"
                  if [ "$local" != "$remote" ]; then
                      echo "shouldPublish=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "shouldPublish=false" >> "$GITHUB_OUTPUT"
                  fi

    # Publishes to npm via OIDC trusted publishing. Runs in the `NPM` environment,
    # so a maintainer must approve each publish (set required reviewers on that
    # environment). No NPM_TOKEN — npm mints a short-lived credential and attaches
    # provenance automatically.
    publish:
        needs: version
        if: needs.version.outputs.shouldPublish == 'true'
        runs-on: ubuntu-latest
        environment: NPM
        permissions:
            contents: write # changesets/action pushes the release tag
            id-token: write # OIDC for npm trusted publishing
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '20'
                  cache: 'npm'
                  registry-url: 'https://registry.npmjs.org'
            # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 20 ships npm 10.
            - run: npm install -g npm@11
            - run: npm ci
            - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
              with:
                  publish: npm run release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
